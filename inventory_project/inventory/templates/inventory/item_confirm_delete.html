<!-- inventory/templates/inventory/item_confirm_delete.html -->
{% extends "base.html" %}

{% block title %}Delete {{ item.name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">

    <div class="card border-danger">
      <div class="card-header bg-danger text-white">
        <h4 class="mb-0">⚠️ Confirm Deletion</h4>
      </div>
      <div class="card-body text-center">
        <p class="fs-5">Are you sure you want to delete:</p>
        <h3 class="text-danger">{{ item.name }}</h3>
        <p class="text-muted">SKU: {{ item.sku }} &nbsp;|&nbsp; Qty: {{ item.quantity }}</p>
        <p class="text-danger fw-bold">This action cannot be undone.</p>

        <!-- POST required — GET only shows this confirmation page -->
        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger btn-lg me-3">
            Yes, Delete
          </button>
          <a href="{% url 'inventory:list' %}" class="btn btn-secondary btn-lg">
            Cancel
          </a>
        </form>
      </div>
    </div>

  </div>
</div>
{% endblock %}
